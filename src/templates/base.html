<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline' https://accounts.google.com; script-src 'self' 'unsafe-inline' https://accounts.google.com; script-src-elem 'self' https://accounts.google.com; img-src 'self' data:; frame-src 'self' https://accounts.google.com; connect-src 'self' https://accounts.google.com;"
    />
    <meta
      name="description"
      content="Robia Loans platform for getting and providing loans."
    />
    <meta
      name="keywords"
      content="Robia Loans, loans, lending, borrowing, finance"
    />
    <title>{% if title %} {{ title }} {% endif %}</title>
    <link rel="stylesheet" href="{{ static_path }}" />
    <script
      src="https://accounts.google.com/gsi/client"
      nonce="{{ nonce }}"
      async
      defer
    ></script>
    <script src="{{ static_js_path }}" defer nonce="{{ nonce }}"></script>
  </head>
  <body>
    <header class="menubar">
      <span class="menubar-logo"
        ><a href="/" class="logo"
          ><img
            height="24"
            width="24"
            src="/static/svg/logo.svg"
            alt="Robia Loans Logo" /></a
      ></span>
      <span class="menubar-button"
        ><a href="#quick-loan" class="shallow hide-decoration"
          >Get a Loan</a
        ></span
      >
      <span class="menubar-button"
        ><a href="#" class="shallow hide-decoration">Provide a Loan</a></span
      >
      <span class="menubar-button"
        ><a href="#" class="shallow hide-decoration">Blog</a></span
      >
      <span class="menubar-button"
        ><a href="/login" class="shallow hide-decoration">Sign In</a></span
      >
    </header>
    <main>
      <section class="container-side"></section>
      <section class="container">
        {% block content %} {% endblock %} {% if success_popup %}
        <div class="success-popup">
          <div class="success-popup-center">
            <div>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                height="24px"
                viewBox="0 -960 960 960"
                width="24px"
                fill="#e3e3e3"
              >
                <path
                  d="m424-296 282-282-56-56-226 226-114-114-56 56 170 170Zm56 216q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"
                />
              </svg>
              <p>{{ success_popup }}</p>
            </div>
            <div class="shrinking-horizontal-bar"></div>
          </div>
        </div>
        {% endif %} {% if error_popup %}
        <div class="error-popup">
          <div class="error-popup-center">
            <div>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                height="24px"
                viewBox="0 -960 960 960"
                width="24px"
                fill="#e3e3e3"
              >
                <path
                  d="M508.5-291.5Q520-303 520-320t-11.5-28.5Q497-360 480-360t-28.5 11.5Q440-337 440-320t11.5 28.5Q463-280 480-280t28.5-11.5ZM440-440h80v-240h-80v240Zm40 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"
                />
              </svg>
              <p>{{ error_popup }}</p>
            </div>
            <div class="shrinking-horizontal-bar"></div>
          </div>
        </div>
        {% endif %}
      </section>
      <section class="container-side"></section>
    </main>
    <footer>
      <p>© {{ title }}. All rights reserved.</p>
    </footer>
  </body>
</html>
