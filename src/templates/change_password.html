{% extends "base.html" %}
{% block content %}
  <form class="login-container"
        name="change-password-form"
        method="post"
        action="/update-password">
    <img height="48" width="48" src="/static/svg/logo.svg" alt="logo" />
    <h1>Change Password</h1>
    <p>Enter your new password below to change your password.</p>
    <div class="input-base-section full-width">
      <div class="input-base-container full-width">
        <p>New Password</p>
        <input id="new-password"
               name="new_password"
               type="password"
               class="input-base-item full-width"
               placeholder="Enter your new password"
               pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
               oninvalid=" this.setCustomValidity( 'Password must be at least 8 characters long and include at least one uppercase letter, one lowercase letter, and one number', ) "
               oninput="this.setCustomValidity('')"
               required />
      </div>
    </div>
    <div class="input-base-section full-width">
      <div class="input-base-container full-width">
        <p>Confirm New Password</p>
        <input id="confirm-password"
               type="password"
               class="input-base-item full-width"
               placeholder="Confirm your new password"
               pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
               oninvalid=" this.setCustomValidity( 'Passwords must match', ) "
               oninput="this.setCustomValidity('')"
               required />
      </div>
    </div>
    <input required type="hidden" id="token" name="token" value="{{ token }}" />
    <div id="error-message" class="error-message full-width"></div>
    <button type="submit" class="submit-button">Change Password</button>
  </form>
{% endblock content %}
