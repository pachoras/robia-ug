{% extends 'base.html' %}

{% block content %}
  <div class="login-container">
    <img height="48" width="48" src="/static/svg/logo.svg" alt="Robia Loans Logo" />
    <div class="input-base-section full-width">
      <div class="input-base-container full-width">
        <p>Username</p>
        <input id="username" type="text" class="input-base-item full-width" placeholder="Enter your username" />
      </div>
    </div>
    <div class="input-base-section full-width">
      <div class="input-base-container full-width">
        <p>Password</p>
        <input id="password" type="password" class="input-base-item full-width" placeholder="Enter your password" />
      </div>
    </div>
    <button class="submit-button">Sign In</button>
  </div>
{% endblock %}
